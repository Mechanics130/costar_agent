name: Bug report
description: Report a problem in CoStar
labels: [bug]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Engine-mode CLI
        - Claude host-model adapter
        - Codex host-model adapter
        - OpenClaw host-model adapter
        - Briefing insight output
        - Graph / view / profile store
        - Documentation
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, host product version if relevant.
      placeholder: Windows 11, Node 20.x, Claude Desktop x.y.z
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CoStar branch / commit
      placeholder: release/0.2.0-briefing-host-hygiene, abc1234
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue briefly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Include the command, host prompt, sample input, and whether it blocks install, full-loop validation, or polish only.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Command output or transcript excerpt
      description: Paste only non-sensitive output. Remove real names, paths, API keys, or private material first.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private real-person data, local secrets, and API keys from this report.
          required: true
